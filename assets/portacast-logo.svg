<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Radar/Wave Icon -->
  <g transform="translate(20, 20)">
    <!-- Center dot -->
    <circle cx="40" cy="40" r="6" fill="#F97316"/>
    
    <!-- Wave rings -->
    <circle cx="40" cy="40" r="15" stroke="#1E3A8A" stroke-width="2.5" fill="none" opacity="0.9"/>
    <circle cx="40" cy="40" r="25" stroke="#1E3A8A" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="40" cy="40" r="35" stroke="#1E3A8A" stroke-width="1.5" fill="none" opacity="0.3"/>
    
    <!-- Radar sweep line -->
    <line x1="40" y1="40" x2="40" y2="5" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="65" y2="20" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- PortaCast Wordmark -->
  <text x="110" y="55" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="36" font-weight="700" fill="#1E3A8A">PortaCast</text>
  
  <!-- Tagline -->
  <text x="110" y="75" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748B" letter-spacing="0.5">See demand before it hits</text>
</svg>
