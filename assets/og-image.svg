<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1E3A8A"/>
  
  <!-- Grid pattern (subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Large radar visualization (centered) -->
  <g transform="translate(600, 315)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="18" fill="#F97316"/>
    
    <!-- Concentric waves -->
    <circle cx="0" cy="0" r="60" stroke="#FFFFFF" stroke-width="6" fill="none" opacity="0.9"/>
    <circle cx="0" cy="0" r="110" stroke="#FFFFFF" stroke-width="5" fill="none" opacity="0.6"/>
    <circle cx="0" cy="0" r="160" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="210" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.2"/>
    
    <!-- Radar sweep -->
    <line x1="0" y1="0" x2="0" y2="-210" stroke="#DC2626" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="150" y2="-150" stroke="#DC2626" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Signal dots (demand indicators) -->
    <circle cx="80" cy="-60" r="8" fill="#F97316" opacity="0.8"/>
    <circle cx="-100" cy="40" r="8" fill="#F97316" opacity="0.8"/>
    <circle cx="120" cy="90" r="8" fill="#F97316" opacity="0.8"/>
  </g>
  
  <!-- Branding -->
  <text x="600" y="520" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" text-anchor="middle">PortaCast</text>
  <text x="600" y="565" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="400" fill="#F97316" text-anchor="middle" letter-spacing="1">See demand before it hits</text>
</svg>
