<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1500" height="500" fill="url(#bgGradient)"/>
  
  <!-- Decorative wave patterns (background) -->
  <circle cx="100" cy="100" r="80" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.1"/>
  <circle cx="100" cy="100" r="120" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.05"/>
  <circle cx="1400" cy="400" r="100" stroke="#F97316" stroke-width="2" fill="none" opacity="0.1"/>
  <circle cx="1400" cy="400" r="150" stroke="#F97316" stroke-width="2" fill="none" opacity="0.05"/>
  
  <!-- Main radar icon (left) -->
  <g transform="translate(150, 250)">
    <circle cx="0" cy="0" r="12" fill="#F97316"/>
    <circle cx="0" cy="0" r="30" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.6"/>
    <circle cx="0" cy="0" r="70" stroke="#FFFFFF" stroke-width="2.5" fill="none" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="50" y2="-50" stroke="#DC2626" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- PortaCast branding -->
  <text x="280" y="240" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF">PortaCast</text>
  <text x="280" y="285" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="28" font-weight="400" fill="#F97316" letter-spacing="1">See demand before it hits</text>
  
  <!-- Map/location hint -->
  <g transform="translate(1150, 250)" opacity="0.6">
    <circle cx="0" cy="0" r="4" fill="#F97316"/>
    <circle cx="30" cy="-20" r="4" fill="#F97316"/>
    <circle cx="-25" cy="15" r="4" fill="#F97316"/>
    <path d="M 0 0 L 30 -20 M 0 0 L -25 15" stroke="#F97316" stroke-width="1.5" stroke-dasharray="3,3"/>
  </g>
</svg>
