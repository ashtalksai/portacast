<svg width="1200" height="627" viewBox="0 0 1200 627" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="1200" height="627" fill="#FFFFFF"/>
  
  <!-- Top section with gradient -->
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#topGradient)"/>
  
  <!-- Radar visualization -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="15" fill="#F97316"/>
    <circle cx="0" cy="0" r="50" stroke="#FFFFFF" stroke-width="5" fill="none" opacity="0.9"/>
    <circle cx="0" cy="0" r="90" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.6"/>
    <circle cx="0" cy="0" r="130" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-130" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Demand signals -->
    <circle cx="60" cy="-50" r="10" fill="#F97316"/>
    <circle cx="-70" cy="30" r="10" fill="#F97316"/>
    <circle cx="90" cy="60" r="10" fill="#F97316"/>
  </g>
  
  <!-- Headline -->
  <text x="550" y="150" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">Stop Reacting.</text>
  <text x="550" y="210" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">Start Predicting.</text>
  <text x="550" y="280" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" font-weight="400" fill="#F97316">See where demand emerges—before your competitors</text>
  
  <!-- Bottom CTA section -->
  <text x="600" y="470" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="36" font-weight="700" fill="#1E3A8A" text-anchor="middle">PortaCast</text>
  <text x="600" y="510" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="500" fill="#64748B" text-anchor="middle">Geographic demand intelligence for fast-moving teams</text>
  
  <!-- CTA button -->
  <rect x="470" y="540" width="260" height="55" rx="8" fill="#F97316"/>
  <text x="600" y="575" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">Try Free Demo →</text>
</svg>
