<svg width="1200" height="627" viewBox="0 0 1200 627" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="627" fill="#F8FAFC"/>
  
  <!-- Map grid background -->
  <defs>
    <pattern id="mapGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="url(#mapGrid)"/>
  
  <!-- Central content box -->
  <rect x="100" y="80" width="1000" height="467" rx="12" fill="#FFFFFF" filter="drop-shadow(0 10px 40px rgba(0,0,0,0.1))"/>
  
  <!-- Icon on left -->
  <g transform="translate(250, 313)">
    <circle cx="0" cy="0" r="12" fill="#F97316"/>
    <circle cx="0" cy="0" r="35" stroke="#1E3A8A" stroke-width="4" fill="none" opacity="0.9"/>
    <circle cx="0" cy="0" r="60" stroke="#1E3A8A" stroke-width="3" fill="none" opacity="0.5"/>
    <circle cx="0" cy="0" r="85" stroke="#1E3A8A" stroke-width="2" fill="none" opacity="0.25"/>
    <line x1="0" y1="0" x2="0" y2="-85" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Main headline -->
  <text x="450" y="240" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="52" font-weight="700" fill="#1E3A8A">Your next market</text>
  <text x="450" y="300" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="52" font-weight="700" fill="#1E3A8A">is signaling right now</text>
  
  <!-- Subheadline -->
  <text x="450" y="350" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="400" fill="#64748B">PortaCast maps real-time demand signals across regions,</text>
  <text x="450" y="380" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="400" fill="#64748B">so you can expand with confidence—not guesswork.</text>
  
  <!-- Stats/proof points -->
  <g transform="translate(450, 430)">
    <text x="0" y="0" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="32" font-weight="700" fill="#F97316">3x</text>
    <text x="70" y="0" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="500" fill="#64748B">Faster market entry</text>
    
    <text x="320" y="0" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="32" font-weight="700" fill="#DC2626">62%</text>
    <text x="410" y="0" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="500" fill="#64748B">Lower expansion risk</text>
  </g>
  
  <!-- CTA -->
  <rect x="450" y="470" width="240" height="50" rx="8" fill="#1E3A8A"/>
  <text x="570" y="502" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">See Live Demo →</text>
</svg>
