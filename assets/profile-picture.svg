<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#1E3A8A"/>
  
  <!-- Radar/Wave Icon (centered and scaled) -->
  <g transform="translate(200, 200)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="20" fill="#F97316"/>
    
    <!-- Wave rings -->
    <circle cx="0" cy="0" r="50" stroke="#FFFFFF" stroke-width="8" fill="none" opacity="0.9"/>
    <circle cx="0" cy="0" r="85" stroke="#FFFFFF" stroke-width="6" fill="none" opacity="0.6"/>
    <circle cx="0" cy="0" r="120" stroke="#FFFFFF" stroke-width="5" fill="none" opacity="0.3"/>
    
    <!-- Radar sweep lines -->
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#DC2626" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="85" y2="-85" stroke="#DC2626" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
